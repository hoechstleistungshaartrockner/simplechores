update_points:
  name: Update member points
  description: Add or subtract points from a member's counters
  fields:
    member:
      name: Member
      description: Name of the household member
      required: true
      example: "John"
      selector:
        text:
    offset:
      name: Points offset
      description: Number of points to add (positive) or subtract (negative)
      required: true
      example: 10
      selector:
        number:
          mode: box
          min: -10000
          max: 10000
    periods:
      name: Periods
      description: Which period counters to update (defaults to all)
      required: false
      example: ["daily", "weekly"]
      selector:
        select:
          multiple: true
          options:
            - label: Daily
              value: daily
            - label: Weekly
              value: weekly
            - label: Monthly
              value: monthly
            - label: Yearly
              value: yearly

reset_points:
  name: Reset member points
  description: Reset a member's point counters to zero
  fields:
    member:
      name: Member
      description: Name of the household member
      required: true
      example: "John"
      selector:
        text:
    periods:
      name: Periods
      description: Which period counters to reset (defaults to all)
      required: false
      example: ["daily", "weekly"]
      selector:
        select:
          multiple: true
          options:
            - label: Daily
              value: daily
            - label: Weekly
              value: weekly
            - label: Monthly
              value: monthly
            - label: Yearly
              value: yearly

toggle_chore:
  name: Toggle chore status
  description: Toggle a chore between pending and completed. If pending/overdue, marks as completed by the specified member. If completed, marks as pending.
  fields:
    entity_id:
      name: Entity ID
      description: Entity ID of the chore status select entity
      required: true
      example: "select.simplechores_dishwashing_status"
      selector:
        entity:
          domain: select
          integration: simplechores
    member:
      name: Member
      description: Name of the member completing the chore
      required: true
      example: "John"
      selector:
        text:

update_chores:
  name: Update chores status
  description: Check all chore due dates and update their statuses accordingly (overdue if past, pending if today, completed if future)

reschedule_chore:
  name: Reschedule chore
  description: Change the due date of a chore to a specific date or relative days from now
  fields:
    entity_id:
      name: Entity ID
      description: Entity ID of the chore status select entity
      required: true
      example: "select.simplechores_dishwashing_status"
      selector:
        entity:
          domain: select
          integration: simplechores
    due_date:
      name: Due Date
      description: Specific due date for the chore (takes precedence over days_from_now)
      required: false
      example: "2024-12-25"
      selector:
        date:
    days_from_now:
      name: Days from now
      description: Number of days from today to set as due date (1 = tomorrow, 2 = day after, etc.)
      required: false
      example: 1
      selector:
        number:
          mode: box
          min: 0
          max: 365
